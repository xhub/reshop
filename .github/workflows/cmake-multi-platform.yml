# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: Multiplatform (Linux, MacOs, Windows) and multi-compiler builds

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-2025, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, clang-cl, cl]
        include:
          - os: windows-2025
            c_compiler: cl
            cpp_compiler: cl
          - os: windows-2025
            c_compiler: clang-cl
            cpp_compiler: clang-cl
          - os: windows-2025
            c_compiler: clang
            cpp_compiler: clang++
          - os: windows-2025
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: ubuntu-latest
            c_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang-cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: clang-cl
          - os: macos-latest
            c_compiler: gcc

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

#    - uses: actions/setup-python@v6
#      with:
#        python-version: |
#            3.12
#            3.13
#            3.14

    - uses: actions/setup-python@v6
      id: cp312
      with:
        python-version: 3.12

    - uses: actions/setup-python@v6
      id: cp313
      with:
        python-version: 3.13

    - uses: actions/setup-python@v6
      id: cp314
      with:
        python-version: 3.14

    - name: Install dependencies
      run: |
        pip3.12 install numpy scipy pytest setuptools
        pip3.13 install numpy scipy pytest setuptools
        pip3.14 install swig==4.3.1.post0 numpy scipy pytest setuptools

    - name: Cleanup python path (windows)
      if: contains(matrix.os, 'windows')
      id: python_path
      shell: pwsh
      run: |
        $cleanPath312 = "${{ steps.cp312.outputs.python-path }}".Replace('\', '/')
        $cleanPath313 = "${{ steps.cp313.outputs.python-path }}".Replace('\', '/')
        $cleanPath314 = "${{ steps.cp314.outputs.python-path }}".Replace('\', '/')
        echo "PY312=$cleanPath312" >> $env:GITHUB_OUTPUT
        echo "PY313=$cleanPath313" >> $env:GITHUB_OUTPUT
        echo "PY314=$cleanPath314" >> $env:GITHUB_OUTPUT

    - name: Setup MSVC
      if: matrix.c_compiler == 'cl'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Configure CMake on unix
      if: contains(matrix.os, 'macos') || contains(matrix.os, 'ubuntu')
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -G Ninja -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_PYTHON="${{ steps.cp312.outputs.python-path }} ${{ steps.cp313.outputs.python-path }} ${{ steps.cp314.outputs.python-path }}"
        -DBUILD_GAMS_DRIVER=1
        -S ${{ github.workspace }}

    - name: Configure CMake on windows
      if: contains(matrix.os, 'windows') && matrix.build_type != 'Debug'
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -G Ninja -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_PYTHON="${{ steps.python_path.outputs.PY312 }} ${{ steps.python_path.outputs.PY313 }} ${{ steps.python_path.outputs.PY314 }}"
        -DBUILD_GAMS_DRIVER=1
        -S ${{ github.workspace }}

     # On windows and in debug mode, we would need a debug version of the python lib...
    - name: Configure CMake (no python)
      if: matrix.build_type == 'Debug' && contains(matrix.os, 'windows')
      run: >
        cmake -G Ninja -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DBUILD_GAMS_DRIVER=1
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} -v
        cmake --install ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} -v

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      if: (matrix.c_compiler != 'gcc' && matrix.c_compiler != 'cl') || !contains(matrix.os, 'windows')
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

    # As of 2025.09.02, the gcc-mingw toolchain produces a DLL with a dependency to libgcc for TLS.
    # This may or not be the reason the python module can't be loaded. However, tests using newer
    # Mingw releases don't suffer form this. Both clang-cl and clang produces working python module
    - name: Test (no python)
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      if: matrix.c_compiler == 'gcc' && contains(matrix.os, 'windows')
      run: ctest --build-config ${{ matrix.build_type }} -E python --output-on-failure

    - name: Upload output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: artifacts-${{ matrix.os }}-${{ matrix.c_compiler }}-${{ matrix.build_type }}
        path: ${{ steps.strings.outputs.build-output-dir }}/output
        overwrite: true

  pypi-publish:
    name: Upload release to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://test.pypi.org/p/reshop
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
    #  - name: Download windows-2025 artifacts
    #    uses: actions/download-artifact@v4
    #    with:
    #      name: artifacts-windows-2025-clang-Release
    #      path: dist

      - name: Download macos artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-macos-latest-clang-Release
          path: dist

      - name: Download linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-ubuntu-latest-gcc-Release
          path: dist


      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
#          packages-dir: ${{ steps.strings.outputs.build-output-dir }}/output
          verbose: true
          repository-url: https://test.pypi.org/legacy/
